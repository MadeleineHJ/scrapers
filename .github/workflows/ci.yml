name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create dummy .env for CI
        run: |
          echo "GCP_PROJECT_ID=dummy" >> .env
          echo "BQ_DATASET=dummy" >> .env
          echo "GOOGLE_APPLICATION_CREDENTIALS=dummy" >> .env
          echo "FOOTBALL_API_KEY=dummy" >> .env
          echo "LOG_LEVEL=INFO" >> .env

      - name: Check spiders
        run: scrapy check

      - name: Run tests
        run: python -m pytest tests/ -v